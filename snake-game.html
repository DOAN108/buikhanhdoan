<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trò chơi Con Rắn cơ bản</title>
  <meta name="description" content="Game Snake cơ bản: điều khiển bằng phím mũi tên, ăn mồi tăng điểm, kết thúc khi va tường/va thân." />

  <style>
    :root{
      --bg:#0b1220;
      --muted:#9aa7bd;
      --text:#e8eefc;
      --brand:#6d5efc;
      --border:rgba(255,255,255,.12);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(900px 500px at 20% 0%, rgba(109,94,252,.25), transparent 60%),
        radial-gradient(700px 400px at 80% 10%, rgba(34,197,94,.18), transparent 55%),
        var(--bg);
      color:var(--text);
      line-height:1.4;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:22px 14px;
    }

    .wrap{
      width:min(980px, 100%);
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:14px 16px;
      background: rgba(18,26,45,.66);
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 14px 45px rgba(0,0,0,.25);
      backdrop-filter: blur(10px);
    }

    .brand{
      display:flex; align-items:center; gap:10px;
      font-weight:1000; letter-spacing:.2px;
    }

    .logo{
      width:34px; height:34px; border-radius:10px;
      background: linear-gradient(135deg, var(--brand), #3b82f6);
      box-shadow: 0 0 0 1px rgba(255,255,255,.12) inset, 0 14px 40px rgba(109,94,252,.28);
      display:flex; align-items:center; justify-content:center;
    }

    .meta{
      color:var(--muted);
      font-weight:850;
      font-size:13px;
      text-align:right;
    }

    .panel{
      background: rgba(18,26,45,.66);
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 14px 45px rgba(0,0,0,.25);
      padding:14px;
      backdrop-filter: blur(10px);
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .kpi{
      display:flex; gap:10px; flex-wrap:wrap;
      font-weight:950;
    }
    .kpi .item{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      border-radius: 999px;
      padding:8px 12px;
      color: rgba(232,238,252,.92);
      display:flex;
      gap:8px;
      align-items:center;
    }
    .kpi .lbl{color:var(--muted); font-weight:900; font-size:12px}
    .kpi .val{font-size:14px}

    .btns{display:flex; gap:10px; flex-wrap:wrap}
    button{
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.05);
      color:var(--text);
      font-weight:950;
      cursor:pointer;
      transition: transform .08s ease, border-color .2s ease, background .2s ease;
      user-select:none;
    }
    button:hover{transform: translateY(-1px); border-color: rgba(255,255,255,.20)}
    button.primary{
      background: linear-gradient(135deg, rgba(109,94,252,.95), rgba(59,130,246,.70));
      border-color: rgba(255,255,255,.14);
    }

    .game-area{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
      justify-items:center;
    }

    canvas{
      width:min(860px, 100%);
      height:auto;
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
    }

    .help{
      color:var(--muted);
      font-weight:850;
      font-size:13px;
      text-align:center;
      line-height:1.7;
    }

    .help b{color:var(--text)}

    .toast{
      margin-top:6px;
      color:var(--muted);
      font-weight:900;
      font-size:13px;
      text-align:center;
      min-height:18px;
    }

    .sr-only{
      position:absolute;
      width:1px; height:1px;
      padding:0; margin:-1px;
      overflow:hidden; clip:rect(0,0,0,0);
      white-space:nowrap; border:0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">🐍</div>
        <div>Con Rắn — Snake cơ bản</div>
      </div>
      <div class="meta">Phím mũi tên: điều khiển • Eat food: tăng điểm</div>
    </header>

    <div class="panel">
      <div class="topbar">
        <div class="kpi">
          <div class="item"><span class="lbl">Điểm</span><span class="val" id="score">0</span></div>
          <div class="item"><span class="lbl">Cao nhất</span><span class="val" id="best">0</span></div>
          <div class="item"><span class="lbl">Tốc độ</span><span class="val" id="speedLabel">1x</span></div>
        </div>
        <div class="btns">
          <button class="primary" id="btnStart" type="button">Start</button>
          <button id="btnPause" type="button">Pause</button>
          <button id="btnRestart" type="button">Restart</button>
        </div>
      </div>

      <div class="game-area">
        <canvas id="game" width="720" height="720" aria-label="Game Snake"></canvas>
        <div class="help">
          Điều khiển: <b>↑ ↓ ← →</b>. <b>Không được đổi hướng ngược lại</b>. 
          Game over khi va <b>tường</b> hoặc <b>va thân</b>.
        </div>
        <div class="toast" id="status" aria-live="polite"></div>
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const speedLabelEl = document.getElementById('speedLabel');
  const statusEl = document.getElementById('status');

  const btnStart = document.getElementById('btnStart');
  const btnPause = document.getElementById('btnPause');
  const btnRestart = document.getElementById('btnRestart');

  // Grid
  const GRID = 24; // 24x24
  const CELL = canvas.width / GRID; // 30

  const colors = {
    bg: 'rgba(0,0,0,.18)',
    grid: 'rgba(255,255,255,.05)',
    wall: 'rgba(255,255,255,.10)',
    snake1: 'rgba(109,94,252,1)',
    snake2: 'rgba(59,130,246,1)',
    food: 'rgba(34,197,94,1)',
    food2: 'rgba(16,185,129,1)',
    text: '#e8eefc',
    muted: 'rgba(154,167,189,.95)',
    overBg: 'rgba(0,0,0,.55)'
  };

  let snake, dir, nextDir, food, score, best;
  let running = false;
  let paused = false;
  let lastTime = 0;
  let acc = 0;

  // Speed controls
  // tick every (baseDelay / speedMul)
  const baseDelay = 130; // ms
  let speedMul = 1;

  function loadBest(){
    const n = Number(localStorage.getItem('snake_best') || '0');
    return Number.isFinite(n) ? n : 0;
  }
  function saveBest(n){
    localStorage.setItem('snake_best', String(n));
  }

  function setStatus(msg){
    statusEl.textContent = msg || '';
  }

  function resetGame(){
    score = 0;
    speedMul = 1;
    scoreEl.textContent = String(score);
    speedLabelEl.textContent = `${speedMul}x`;

    // Start snake centered
    const startX = Math.floor(GRID/2);
    const startY = Math.floor(GRID/2);

    snake = [
      {x: startX, y: startY},
      {x: startX-1, y: startY},
      {x: startX-2, y: startY}
    ];

    dir = {x: 1, y: 0};
    nextDir = {x: 1, y: 0};

    placeFood();

    running = false;
    paused = false;
    setStatus('Nhấn Start để bắt đầu.');
  }

  function placeFood(){
    // choose empty cell
    const occupied = new Set(snake.map(p => `${p.x},${p.y}`));
    const free = [];
    for(let y=0;y<GRID;y++){
      for(let x=0;x<GRID;x++){
        const key = `${x},${y}`;
        if(!occupied.has(key)) free.push({x,y});
      }
    }
    food = free[Math.floor(Math.random()*free.length)] || {x:1,y:1};
  }

  function setDir(newDir){
    // prevent opposite direction
    if(newDir.x === -dir.x && newDir.y === -dir.y) return;
    nextDir = newDir;
  }

  function step(){
    // apply nextDir
    dir = nextDir;

    const head = snake[0];
    const newHead = {x: head.x + dir.x, y: head.y + dir.y};

    // wall collision (tường)
    if(newHead.x < 0 || newHead.y < 0 || newHead.x >= GRID || newHead.y >= GRID){
      gameOver('Game over! Va tường.');
      return;
    }

    // self collision
    if(snake.some(p => p.x === newHead.x && p.y === newHead.y)){
      gameOver('Game over! Va vào thân.');
      return;
    }

    // move
    snake.unshift(newHead);

    const ate = (newHead.x === food.x && newHead.y === food.y);
    if(ate){
      score += 1;
      scoreEl.textContent = String(score);

      // speed up a bit
      // every 4 points -> +0.25 speed
      const newSpeed = 1 + Math.floor(score / 4) * 0.25;
      if(newSpeed !== speedMul){
        speedMul = newSpeed;
        speedLabelEl.textContent = `${speedMul.toFixed(2).replace(/\.00$/,'')}x`;
      }

      placeFood();
    }else{
      snake.pop();
    }
  }

  function gameOver(msg){
    running = false;
    paused = false;
    setStatus(msg);

    if(score > best){
      best = score;
      bestEl.textContent = String(best);
      saveBest(best);
    }
  }

  function draw(){
    // background
    ctx.fillStyle = colors.bg;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // grid + border
    ctx.strokeStyle = colors.grid;
    ctx.lineWidth = 1;
    for(let i=1;i<GRID;i++){
      ctx.beginPath();
      ctx.moveTo(i*CELL, 0);
      ctx.lineTo(i*CELL, canvas.height);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0, i*CELL);
      ctx.lineTo(canvas.width, i*CELL);
      ctx.stroke();
    }

    // walls border
    ctx.strokeStyle = colors.wall;
    ctx.lineWidth = 2;
    ctx.strokeRect(0,0,canvas.width,canvas.height);

    // food
    const fx = food.x * CELL;
    const fy = food.y * CELL;
    const pad = CELL * 0.18;

    // food circle-ish
    ctx.fillStyle = colors.food;
    ctx.beginPath();
    ctx.arc(fx + CELL/2, fy + CELL/2, CELL/2 - pad, 0, Math.PI*2);
    ctx.fill();

    // highlight
    ctx.fillStyle = colors.food2;
    ctx.beginPath();
    ctx.arc(fx + CELL/2 - 4, fy + CELL/2 - 4, CELL/3 - pad/2, 0, Math.PI*2);
    ctx.fill();

    // snake
    for(let i=0;i<snake.length;i++){
      const p = snake[i];
      const x = p.x * CELL;
      const y = p.y * CELL;

      const r = CELL * 0.18;
      const isHead = i === 0;

      ctx.fillStyle = isHead ? colors.snake2 : colors.snake1;
      roundRect(ctx, x + r, y + r, CELL - 2*r, CELL - 2*r, CELL*0.22);
      ctx.fill();

      // head eyes
      if(isHead){
        ctx.fillStyle = 'rgba(232,238,252,.95)';
        const ex = x + CELL*0.35;
        const ey = y + CELL*0.38;
        ctx.beginPath();
        ctx.arc(ex, ey, CELL*0.07, 0, Math.PI*2);
        ctx.arc(x + CELL*0.65, ey, CELL*0.07, 0, Math.PI*2);
        ctx.fill();
      }
    }

    if(running){
      return;
    }

    // overlay pause? game over? 
    // If status includes game over, show overlay
    if(statusEl.textContent.includes('Game over')){
      drawOverlay('Game Over');
    }
  }

  function drawOverlay(title){
    ctx.fillStyle = colors.overBg;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = colors.text;
    ctx.font = '700 44px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(title, canvas.width/2, canvas.height/2 - 18);

    ctx.fillStyle = colors.muted;
    ctx.font = '800 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
    ctx.fillText(`Điểm: ${score} • Nhấn Restart để chơi lại`, canvas.width/2, canvas.height/2 + 20);
  }

  function roundRect(ctx, x, y, w, h, r){
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr);
    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();
  }

  function loop(t){
    requestAnimationFrame(loop);
    const now = t || 0;

    draw();

    if(!running || paused) return;

    const delay = baseDelay / speedMul;
    const dt = now - lastTime;
    lastTime = now;
    acc += dt;

    while(acc >= delay){
      step();
      acc -= delay;
      if(!running) break;
    }
  }

  function start(){
    if(running) return;
    paused = false;
    // if it was gameover, reset
    if(statusEl.textContent.includes('Game over')){
      resetGame();
    }
    running = true;
    lastTime = performance.now();
    acc = 0;
    setStatus('Đang chạy...');
  }

  function pause(){
    if(!running) return;
    paused = !paused;
    setStatus(paused ? 'Đã pause (nhấn Pause để tiếp tục)' : 'Tiếp tục...');
  }

  function restart(){
    resetGame();
    bestEl.textContent = String(best);
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    const k = e.key;
    if(k === 'ArrowUp') setDir({x:0, y:-1});
    else if(k === 'ArrowDown') setDir({x:0, y:1});
    else if(k === 'ArrowLeft') setDir({x:-1, y:0});
    else if(k === 'ArrowRight') setDir({x:1, y:0});
    else if(k === ' '){
      e.preventDefault();
      if(!running) start();
      else pause();
    }

    // Prevent scrolling
    if(k.startsWith('Arrow')) e.preventDefault();
  }, {passive:false});

  btnStart.addEventListener('click', start);
  btnPause.addEventListener('click', pause);
  btnRestart.addEventListener('click', restart);

  // init
  best = loadBest();
  bestEl.textContent = String(best);
  resetGame();
  // draw first frame
  draw();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
